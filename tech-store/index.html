<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Seja bem vindo a Tech Store! Espero que goste do meu projeto de criação de um site e-commerce utilizando HTML, CSS e JavaScript.">
    <title>TechStore - Produtos eletrônicos</title>
    <link rel="stylesheet" href="src/CSS/style.css">
    <link rel="shortcut icon" href="src/images/logo_techstore.PNG" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <img class="header__img" src="src/images/logo_techstore-letreiro.PNG" alt="">
        <div class="header__container-icons">
            <button class="buttons button__open-cart"><i class="fa-solid fa-cart-shopping"></i></button>
            <button class="buttons"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>
    <div id="container-cart">
        <div class="container-cart__header">
            <h3>Meu carrinho</h3>
            <button class="buttons button__close-cart">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="container-cart__content">

        </div>
        <div class="container-cart__footer">
            <p class="cart-price">R$ 0</p>
            <button class="buttons button__finalize-puchase">Finalizar compra</button>
        </div>
    </div>
    <main>
        <section id="section-products">
        </section>
    </main>
    <footer>
        <a target="_blank" href="https://github.com/ABeatrizSC"><i class="fa-brands fa-github"></i> ABeatrizSC</a>
    </footer>
    <script src="src/script/main.js" type="module"></script>
</body>
</html>
